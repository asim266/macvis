appId: ai.macvis.app
productName: MacVis
copyright: Copyright © 2026 Muhammad Asim
artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  # Code-signing config (see docs/SIGNING.md).
  # Default unsigned: identity:null + hardenedRuntime:false.
  # To produce a signed + notarized build, run:
  #   pnpm build --mac --config.mac.identity="Developer ID Application: <Name> (<TEAMID>)" \
  #              --config.mac.hardenedRuntime=true \
  #              --config.mac.notarize=true
  # plus APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID env vars.
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: MacVis uses the microphone for voice input
    NSCameraUsageDescription: MacVis may access the camera for vision features
    NSAppleEventsUsageDescription: MacVis uses Apple Events to automate other apps
    NSSystemAdministrationUsageDescription: MacVis may use admin access for some operations

dmg:
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
  title: ${productName} ${version}

directories:
  output: dist
  buildResources: assets

files:
  - out/**/*
  - package.json
  - "!node_modules/**/*"

asar: true

# Publish channel for electron-updater. We don't auto-publish from `pnpm build`
# (publish flag must be passed explicitly), but the channel is configured so
# the updater knows where to look once a release is uploaded.
publish:
  - provider: github
    owner: asim266
    repo: macvis
    releaseType: release
