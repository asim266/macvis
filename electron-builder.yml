appId: ai.macvis.app
productName: MacVis
copyright: Copyright © 2026 Muhammad Asim
artifactName: ${productName}-${version}-${arch}.${ext}

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: false
  gatekeeperAssess: false
  identity: null  # Skip code signing for now (open-source, BYO-sign)
  extendInfo:
    NSMicrophoneUsageDescription: MacVis uses the microphone for voice input
    NSCameraUsageDescription: MacVis may access camera for vision features
    NSAppleEventsUsageDescription: MacVis needs automation access to control apps
    NSSystemAdministrationUsageDescription: MacVis needs admin access for some operations

dmg:
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications
  title: ${productName} ${version}

directories:
  output: dist
  buildResources: assets

files:
  - out/**/*
  - package.json
  - "!node_modules/**/*"

asar: true

# Skip publishing — release is uploaded manually via gh release create
publish: null
